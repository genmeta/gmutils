[package]
name = "xtask"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
bollard = "0.19"
cargo_metadata = "0.19"
clap = { version = "4", features = ["derive"] }
flate2 = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
snafu = "0.9"
tar = "0.4"
futures-util = "0.3"
tokio = { version = "1", features = ["full"] }
xshell = "0.2"
zip = { version = "4", default-features = false, features = ["deflate"] }
