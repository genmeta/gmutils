[package]
name = "xtask"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
# Disable default `default-https-client` (pulls aws-lc) and re-enable the
# `rustls` feature (alias of `tls-rustls`, ring backend) plus the other
# defaults we actually use. Keeps the windows MSVC cross-build off aws-lc-sys,
# which fails to assemble on i686-pc-windows-msvc under clang-cl.
aws-config = { version = "1", default-features = false, features = [
    "behavior-version-latest",
    "credentials-process",
    "rt-tokio",
    "rustls",
    "sso",
] }
aws-credential-types = "1"
aws-sdk-s3 = { version = "1", default-features = false, features = [
    "rt-tokio",
    "rustls",
    "sigv4a",
] }
aws-types = "1"
bollard = "0.19"
cargo_metadata = "0.19"
clap = { version = "4", features = ["derive", "env"] }
flate2 = "1"
inquire = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
snafu = "0.9"
tar = "0.4"
tempfile = "3"
toml = "1"
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures-util = "0.3"
tokio = { version = "1", features = ["full"] }
walkdir = "2"
zip = { version = "4", default-features = false, features = ["deflate"] }
