[package]
name = "genmeta"
version = "0.1.2"
edition = "2024"

[dependencies]
clap = { workspace = true }
genmeta-ssh3 = { workspace = true }
genmeta-request = { workspace = true }
http = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Package Metadata (Debian)
[package.metadata.deb]
name = "gmutils"
maintainer = "Genmeta QUIC Team <quic_team@genmeta.net>"
copyright = "Copyright © 2025 Genmeta QUIC Team"
extended-description = """Genmeta Binary Utilities"""
depends = "$auto"
section = "utilities"
priority = "optional"
assets = [["target/release/genmeta", "usr/bin/", "755"]]
