[package]
name = "genmeta"
homepage = "www.genmeta.net"
description = "Genmeta Binary Utilities"
license = "Shareware"
version = "0.4.2"
edition = "2024"

[dependencies]
clap = { workspace = true }
genmeta-common = { workspace = true, features = ["error"] }
genmeta-curl = { workspace = true }
genmeta-discover = { workspace = true }
genmeta-doctor = { workspace = true }
genmeta-identity = { workspace = true }
genmeta-nslookup = { workspace = true }
genmeta-ssh3 = { workspace = true }
genmeta-proxy = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }


[[package.metadata.genmeta-buildx.deb.packages]]
name = "gmutils"
upload.remote = "ubuntu@download.genmeta.net:/data/wwwroot/ppa/deb/main"

build.builder = "zigbuild"
build.dependencies.always = ["$arch:libc-dev"]

package.commands = [
  "cargo deb --target $target --no-build --no-strip",
  "cp target/$target/debian/*.deb $debs/",
]

[[package.metadata.genmeta-buildx.homebrew.formulae]]
upload.remote = "ubuntu@download.genmeta.net:/data/wwwroot/homebrew"
download.url = "https://download.genmeta.net/homebrew"
build.apple = true
build.intel = true

copy-assets = [
  "cp $project/target/$target/release/genmeta $formula/",
  "cp $project/genmeta-ssh3.sh $formula/",
]

content = """
  def install
    bin.install "genmeta"
    bin.install "genmeta-ssh3.sh"
  end

  test do
    system "#{bin}/gmutils", "-V"
  end
"""

[[package.metadata.genmeta-buildx.scoop.packages]]
upload.remote = "ubuntu@download.genmeta.net:/data/wwwroot/scoop"
download.url = "https://download.genmeta.net/scoop"

build.builder = "xwin build"
build.32bit = true
build.64bit = true
# build.arm64 = true


bin = ["genmeta.exe", "genmeta-ssh3.bat"]
copy-assets = [
  "cp $project/target/$target/release/genmeta.exe $package/",
  "cp $project/genmeta-ssh3.bat $package/",
]

# Package Metadata (Debian)
[package.metadata.deb]
name = "gmutils"
maintainer = "Genmeta Tech Limited <support@genmeta.net>"
copyright = "Copyright © 2025 Genmeta Tech Limited"
depends = "$auto"
section = "utilities"
priority = "optional"
assets = [
  [
    "target/release/genmeta",
    "usr/bin/",
    "755",
  ],
  [
    "../genmeta-ssh3.sh",
    "usr/bin/",
    "755",
  ],
]
