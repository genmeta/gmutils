[package]
name = "genmeta"
description = "Genmeta Binary Utilities"
version = "0.4.0"
edition = "2024"

[dependencies]
clap = { workspace = true }
genmeta-common = { workspace = true }
genmeta-ssh3 = { workspace = true }
genmeta-curl = { workspace = true }
genmeta-nslookup = { workspace = true }
genmeta-discover = { workspace = true }
genmeta-doctor = { workspace = true }
http = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }


[[package.metadata.genmeta-buildx.deb.packages]]
name = "gmutils"
upload.remote = "ubuntu@download.genmeta.net:/data/wwwroot/ppa/deb/main"

build.builder = "zigbuild"
build.dependencies.always = ["$arch:libc-dev"]

package.commands = [
    "cargo deb --target $target --no-build --no-strip",
    "cp target/$target/debian/*.deb $debs/",
]

[[package.metadata.genmeta-buildx.homebrew.formulae]]
upload.remote = "ubuntu@download.genmeta.net:/data/wwwroot/homebrew"
download.url = "https://download.genmeta.net/homebrew"
build.apple = true
build.intel = true

copy-assets = ["cp $project/target/$target/release/genmeta $formula/"]

content = """
  def install
    bin.install "genmeta"
  end

  test do
    system "#{bin}/gmutils", "-V"
  end
"""

# Package Metadata (Debian)
[package.metadata.deb]
name = "gmutils"
maintainer = "Genmeta Tech Limited <support@genmeta.net>"
copyright = "Copyright © 2025 Genmeta Tech Limited"
depends = "$auto"
section = "utilities"
priority = "optional"
assets = [
    [
        "target/release/genmeta",
        "usr/bin/",
        "755",
    ],
    [
        "../genmeta-ssh3.sh",
        "usr/bin/",
        "755",
    ],
]
