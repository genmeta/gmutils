name: Publish crates.io

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - name: Install Rust nightly for formatting
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Check formatting
        run: cargo +nightly fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features

      - name: Preflight workspace publish graph
        run: cargo publish --workspace --exclude xtask --dry-run --locked

      - name: Plan crates.io publish candidates
        id: publish_plan
        shell: bash
        run: |
          set -euo pipefail
          cargo metadata --no-deps --format-version 1 > "$RUNNER_TEMP/gmutils-metadata.json"
          python3 - <<'PY' > "$RUNNER_TEMP/publish-candidates.txt"
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from pathlib import Path

          metadata = json.loads((Path(os.environ["RUNNER_TEMP"]) / "gmutils-metadata.json").read_text())
          packages = {package["id"]: package for package in metadata["packages"]}
          skipped_names = {"xtask"}
          candidates = []
          skipped = []

          for package_id in metadata["workspace_members"]:
              package = packages[package_id]
              name = package["name"]
              if name in skipped_names or package.get("publish") == []:
                  continue
              version = package["version"]
              url = f"https://crates.io/api/v1/crates/{name}/{version}"
              request = urllib.request.Request(
                  url,
                  headers={"User-Agent": "genmeta gmutils release workflow"},
              )
              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      if response.status == 200:
                          skipped.append((name, version))
                          continue
                      raise SystemExit(f"unexpected crates.io status for {name} {version}: {response.status}")
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      candidates.append((name, version))
                      continue
                  raise

          for name, version in skipped:
              print(f"skip {name} {version}", file=sys.stderr)
          for name, version in candidates:
              print(name)
          PY
          mapfile -t candidates < "$RUNNER_TEMP/publish-candidates.txt"
          {
            echo "candidate_count=${#candidates[@]}"
            echo 'publish_candidates<<EOF'
            cat "$RUNNER_TEMP/publish-candidates.txt"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate to crates.io
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && steps.publish_plan.outputs.candidate_count != '0'
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish crates.io candidates
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && steps.publish_plan.outputs.candidate_count != '0'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          PUBLISH_CANDIDATES: ${{ steps.publish_plan.outputs.publish_candidates }}
        run: |
          set -euo pipefail
          mapfile -t packages <<< "$PUBLISH_CANDIDATES"
          args=()
          for package in "${packages[@]}"; do
            if [ -n "$package" ]; then
              args+=(-p "$package")
            fi
          done
          if [ "${#args[@]}" -eq 0 ]; then
            echo "no crates.io publish candidates"
            exit 0
          fi
          cargo publish --locked "${args[@]}"

      - name: Report dry-run candidates
        if: ${{ !(github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) }}
        shell: bash
        env:
          PUBLISH_CANDIDATES: ${{ steps.publish_plan.outputs.publish_candidates }}
        run: |
          set -euo pipefail
          if [ -z "$PUBLISH_CANDIDATES" ]; then
            echo "no crates.io publish candidates"
          else
            printf 'dry-run crates.io publish candidates:\n%s\n' "$PUBLISH_CANDIDATES"
          fi
