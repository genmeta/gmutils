name: Publish crates.io

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - name: Install Rust nightly for formatting
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Check formatting
        run: cargo +nightly fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features

      - name: Plan crates.io publish packages
        id: publish_plan
        shell: bash
        run: |
          set -euo pipefail
          packages=(
            genmeta-access
            genmeta-curl
            genmeta-discover
            genmeta-identity
            genmeta-nat
            genmeta-doctor
            genmeta-nslookup
            genmeta-proxy
            genmeta-ssh
            genmeta
          )
          {
            echo "package_count=${#packages[@]}"
            echo 'publish_packages<<EOF'
            printf '%s\n' "${packages[@]}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate to crates.io
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish crates.io candidates
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          PUBLISH_PACKAGES: ${{ steps.publish_plan.outputs.publish_packages }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            mode=publish
          else
            mode=dry-run
          fi

          mapfile -t packages <<< "$PUBLISH_PACKAGES"
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "no publishable workspace crates"
            exit 0
          fi

          cargo metadata --format-version 1 > "$RUNNER_TEMP/workspace-metadata.json"
          package_versions="$(
            PACKAGES="$(printf '%s\n' "${packages[@]}")" RUNNER_TEMP="$RUNNER_TEMP" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads((Path(os.environ["RUNNER_TEMP"]) / "workspace-metadata.json").read_text())
          packages = [line for line in os.environ["PACKAGES"].splitlines() if line]
          by_name = {package["name"]: package for package in metadata["packages"]}
          for name in packages:
              package = by_name.get(name)
              if package is None:
                  raise SystemExit(f"failed to resolve workspace package metadata for {name}")
              print(f"{name}\t{package['version']}")
          PY
          )"

          packages_to_publish=()
          while IFS=$'\t' read -r crate_name crate_version; do
            [ -n "$crate_name" ] || continue
            crate_state="$(
              python3 - <<'PY' "$crate_name" "$crate_version"
          import sys
          import urllib.error
          import urllib.request

          name, version = sys.argv[1], sys.argv[2]
          headers = {"User-Agent": "genmeta gmutils publish workflow"}
          version_url = f"https://crates.io/api/v1/crates/{name}/{version}"
          version_request = urllib.request.Request(version_url, headers=headers)
          try:
              with urllib.request.urlopen(version_request, timeout=20) as response:
                  if response.status == 200:
                      print("published_version")
                  else:
                      raise SystemExit(f"unexpected crates.io status for {name} {version}: {response.status}")
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  crate_url = f"https://crates.io/api/v1/crates/{name}"
                  crate_request = urllib.request.Request(crate_url, headers=headers)
                  try:
                      with urllib.request.urlopen(crate_request, timeout=20) as response:
                          if response.status == 200:
                              print("missing_version")
                          else:
                              raise SystemExit(f"unexpected crates.io crate status for {name}: {response.status}")
                  except urllib.error.HTTPError as crate_error:
                      if crate_error.code == 404:
                          print("missing_crate")
                      else:
                          raise
              else:
                  raise
          PY
            )"

            if [[ "$crate_state" == "published_version" ]]; then
              echo "skip $crate_name $crate_version (already on crates.io)"
            elif [[ "$crate_state" == "missing_version" ]]; then
              echo "publish $crate_name $crate_version"
              packages_to_publish+=("$crate_name")
            else
              echo "skip $crate_name $crate_version (crate not yet initialized on crates.io)"
            fi
          done <<< "$package_versions"

          if [[ "${#packages_to_publish[@]}" -eq 0 ]]; then
            echo "no already-initialized crates need a new crates.io release"
            exit 0
          fi

          if [[ "$mode" == "dry-run" ]]; then
            publish_args=(cargo publish --dry-run --locked)
            echo "dry-run publish packages: ${packages_to_publish[*]}"
          else
            publish_args=(cargo publish --locked)
            echo "publish packages: ${packages_to_publish[*]}"
          fi

          for package in "${packages_to_publish[@]}"; do
            publish_args+=(-p "$package")
          done
          "${publish_args[@]}"

      - name: Report dry-run candidates
        if: ${{ !(github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) }}
        shell: bash
        env:
          PUBLISH_PACKAGES: ${{ steps.publish_plan.outputs.publish_packages }}
        run: |
          set -euo pipefail
          if [ -z "$PUBLISH_PACKAGES" ]; then
            echo "no crates.io publish candidates"
          else
            printf 'dry-run crates.io publish packages:\n%s\n' "$PUBLISH_PACKAGES"
          fi
