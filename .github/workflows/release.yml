name: Release

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  XTASK_RELEASE_S3_ENDPOINT_URL: ${{ vars.XTASK_RELEASE_S3_ENDPOINT_URL }}
  DHTTP_STUN_SERVER: ${{ vars.DHTTP_STUN_SERVER }}
  DHTTP_H3_DNS_SERVER: ${{ vars.DHTTP_H3_DNS_SERVER }}
  DHTTP_HTTP_DNS_SERVER: ${{ vars.DHTTP_HTTP_DNS_SERVER }}
  DHTTP_MDNS_SERVICE: ${{ vars.DHTTP_MDNS_SERVICE }}
  DHTTP_CERT_SERVER_URL: ${{ vars.DHTTP_CERT_SERVER_URL }}

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Skip GitHub Release for dry-run
        if: ${{ !(github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) }}
        run: echo "not a v* tag; skipping GitHub Release creation"

      - name: Checkout tag
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag_ref="refs/tags/$GITHUB_REF_NAME"
          git fetch --force origin "$tag_ref:$tag_ref"
          tag_object="$(git rev-parse "$tag_ref^{tag}" 2>/dev/null || true)"
          target_commit="$(git rev-parse "$tag_ref^{commit}")"
          notes_file="$RUNNER_TEMP/release-notes.md"
          git for-each-ref "$tag_ref" --format='%(contents)' > "$notes_file"
          if [ ! -s "$notes_file" ]; then
            git log -1 --format=%B "$target_commit" > "$notes_file"
          fi
          {
            printf '\n## Authentication and provenance\n\n'
            printf -- '- Tag: `%s`\n' "$GITHUB_REF_NAME"
            if [ -n "$tag_object" ]; then
              printf -- '- Annotated tag object: `%s`\n' "$tag_object"
            else
              printf -- '- Tag object: lightweight tag\n'
            fi
            printf -- '- Target commit: `%s`\n' "$target_commit"
            printf -- '- Workflow run: %s/%s/actions/runs/%s\n' \
              "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf -- '- Workflow attempt: `%s`\n' "$GITHUB_RUN_ATTEMPT"
            printf -- '- Published by: GitHub Actions `%s` workflow\n' "$GITHUB_WORKFLOW"
          } >> "$notes_file"

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "github release $GITHUB_REF_NAME already exists"
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$notes_file"

  linux-deb:
    needs: github-release
    name: Linux deb packages and S3 publish
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      DHTTP_ROOT_CA: ${{ github.workspace }}/gmutils/keychain/root.crt
      RELEASE_BUCKET: download
      APT_SUITE: genmeta
      APT_PREFIX: ppa/genmeta
      LINUX_TARGETS: x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu armv7-unknown-linux-gnueabihf i686-unknown-linux-gnu
    defaults:
      run:
        shell: bash
        working-directory: gmutils
    steps:
      - name: Checkout gmutils
        uses: actions/checkout@v6
        with:
          path: gmutils
          persist-credentials: false


      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: gmutils-linux-deb-cargo-${{ hashFiles('gmutils/Cargo.lock') }}
          restore-keys: |
            gmutils-linux-deb-cargo-

      - name: Install Linux deb tooling
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends gpg
          docker info

      - name: Validate release configuration and derive APT fingerprint
        id: apt_key
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
          XTASK_RELEASE_APT_SIGNING_KEY: ${{ secrets.XTASK_RELEASE_APT_SIGNING_KEY }}
          XTASK_RELEASE_APT_SIGNING_PASSPHRASE: ${{ secrets.XTASK_RELEASE_APT_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          missing=0
          required=(
            XTASK_RELEASE_S3_ENDPOINT_URL
            DHTTP_STUN_SERVER
            DHTTP_H3_DNS_SERVER
            DHTTP_HTTP_DNS_SERVER
            DHTTP_MDNS_SERVICE
            DHTTP_CERT_SERVER_URL
            XTASK_RELEASE_S3_ACCESS_KEY_ID
            XTASK_RELEASE_S3_SECRET_ACCESS_KEY
            XTASK_RELEASE_APT_SIGNING_KEY
            XTASK_RELEASE_APT_SIGNING_PASSPHRASE
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "missing required release configuration: $name" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit "$missing"
          fi

          key_file="$RUNNER_TEMP/apt-signing-key.asc"
          install -m 700 -d "$(dirname "$key_file")"
          printf '%s' "$XTASK_RELEASE_APT_SIGNING_KEY" > "$key_file"
          fingerprint="$(gpg --batch --import-options show-only --with-colons --import "$key_file" \
            | awk -F: '$1 == "fpr" { print toupper($10); exit }')"
          rm -f "$key_file"
          if [ -z "$fingerprint" ]; then
            echo "failed to derive APT signing key fingerprint" >&2
            exit 1
          fi
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      - name: Package deb artifacts
        run: |
          deb_args=()
          for target in ${LINUX_TARGETS}; do
            deb_args+=(--target "$target")
          done
          if [ "${#deb_args[@]}" -eq 0 ]; then
            echo "linux_targets must not be empty" >&2
            exit 1
          fi

          cargo xtask package --overwrite-manifest \
            deb "${deb_args[@]}"

      - name: Publish S3 for deb artifacts
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
          XTASK_RELEASE_APT_SIGNING_KEY: ${{ secrets.XTASK_RELEASE_APT_SIGNING_KEY }}
          XTASK_RELEASE_APT_SIGNING_PASSPHRASE: ${{ secrets.XTASK_RELEASE_APT_SIGNING_PASSPHRASE }}
          APT_SIGNING_FINGERPRINT: ${{ steps.apt_key.outputs.fingerprint }}
        run: |
          set -euo pipefail
          export XTASK_RELEASE_APT_SIGNING_PASSPHRASE
          mode=dry-run
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            mode=publish
          fi
          publish_cmd=(cargo xtask publish s3)
          if [[ "$mode" == "dry-run" ]]; then
            publish_cmd+=(--dry-run)
          fi
          "${publish_cmd[@]}" \
            --endpoint-url "$XTASK_RELEASE_S3_ENDPOINT_URL" \
            --bucket "$RELEASE_BUCKET" \
            deb --prefix "$APT_PREFIX" --suite "$APT_SUITE" --fingerprint "$APT_SIGNING_FINGERPRINT"

      - name: Upload deb packages to GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(target/*/release/deb/*.deb)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no deb release assets found" >&2
            exit 1
          fi
          for attempt in {1..30}; do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "github release $GITHUB_REF_NAME was not visible after waiting" >&2
              exit 1
            fi
            sleep 2
          done
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload deb manifests
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gmutils-deb-release
          if-no-files-found: ignore
          path: |
            gmutils/target/common/deb/**

  linux-rpm:
    needs: github-release
    name: Linux rpm packages and S3 publish
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      DHTTP_ROOT_CA: ${{ github.workspace }}/gmutils/keychain/root.crt
      RELEASE_BUCKET: download
      RPM_PREFIX: rpm/gmutils
      # Fedora 40 RPM repositories no longer provide armhfp/armv7hl metadata.
      RPM_TARGETS: x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu i686-unknown-linux-gnu
    defaults:
      run:
        shell: bash
        working-directory: gmutils
    steps:
      - name: Checkout gmutils
        uses: actions/checkout@v6
        with:
          path: gmutils
          persist-credentials: false


      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: gmutils-linux-rpm-cargo-${{ hashFiles('gmutils/Cargo.lock') }}
          restore-keys: |
            gmutils-linux-rpm-cargo-

      - name: Install Linux rpm tooling
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends rpm
          docker info

      - name: Validate release configuration
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          missing=0
          required=(
            XTASK_RELEASE_S3_ENDPOINT_URL
            DHTTP_STUN_SERVER
            DHTTP_H3_DNS_SERVER
            DHTTP_HTTP_DNS_SERVER
            DHTTP_MDNS_SERVICE
            DHTTP_CERT_SERVER_URL
            XTASK_RELEASE_S3_ACCESS_KEY_ID
            XTASK_RELEASE_S3_SECRET_ACCESS_KEY
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "missing required release configuration: $name" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Package rpm artifacts
        run: |
          rpm_args=()
          for target in ${RPM_TARGETS}; do
            rpm_args+=(--target "$target")
          done
          if [ "${#rpm_args[@]}" -eq 0 ]; then
            echo "linux_targets must not be empty" >&2
            exit 1
          fi

          cargo xtask package --overwrite-manifest \
            rpm "${rpm_args[@]}"

      - name: Publish S3 for rpm artifacts
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          mode=dry-run
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            mode=publish
          fi
          publish_cmd=(cargo xtask publish s3)
          if [[ "$mode" == "dry-run" ]]; then
            publish_cmd+=(--dry-run)
          fi
          "${publish_cmd[@]}" \
            --endpoint-url "$XTASK_RELEASE_S3_ENDPOINT_URL" \
            --bucket "$RELEASE_BUCKET" \
            rpm --prefix "$RPM_PREFIX"

      - name: Upload rpm packages to GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(target/*/release/rpm/*.rpm)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no rpm release assets found" >&2
            exit 1
          fi
          for attempt in {1..30}; do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "github release $GITHUB_REF_NAME was not visible after waiting" >&2
              exit 1
            fi
            sleep 2
          done
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload rpm manifests
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gmutils-rpm-release
          if-no-files-found: ignore
          path: |
            gmutils/target/common/rpm/**

  linux-scoop:
    needs: github-release
    name: Linux scoop packages and S3 publish
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      DHTTP_ROOT_CA: ${{ github.workspace }}/gmutils/keychain/root.crt
      RELEASE_BUCKET: download
      SCOOP_PREFIX: scoop/gmutils
      SCOOP_PUBLIC_BASE_URL: https://download.dhttp.net/scoop/gmutils
    defaults:
      run:
        shell: bash
        working-directory: gmutils
    steps:
      - name: Checkout gmutils
        uses: actions/checkout@v6
        with:
          path: gmutils
          persist-credentials: false


      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-pc-windows-msvc i686-pc-windows-msvc

      - name: Cache cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            ~/.cargo/bin/cargo-xwin
            ~/.cache/cargo-xwin
          key: gmutils-linux-scoop-cargo-${{ hashFiles('gmutils/Cargo.lock') }}
          restore-keys: |
            gmutils-linux-scoop-cargo-

      - name: Install scoop tooling
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends llvm nasm

      - name: Install cargo-xwin
        run: |
          if ! command -v cargo-xwin >/dev/null 2>&1; then
            cargo install cargo-xwin --locked
          fi

      - name: Validate release configuration
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          missing=0
          required=(
            XTASK_RELEASE_S3_ENDPOINT_URL
            DHTTP_STUN_SERVER
            DHTTP_H3_DNS_SERVER
            DHTTP_HTTP_DNS_SERVER
            DHTTP_MDNS_SERVICE
            DHTTP_CERT_SERVER_URL
            XTASK_RELEASE_S3_ACCESS_KEY_ID
            XTASK_RELEASE_S3_SECRET_ACCESS_KEY
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "missing required release configuration: $name" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Package scoop artifacts
        run: |
          cargo xtask package --overwrite-manifest \
            scoop \
              --target x86_64-pc-windows-msvc \
              --target i686-pc-windows-msvc

      - name: Publish S3 for scoop artifacts
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          mode=dry-run
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            mode=publish
          fi
          publish_cmd=(cargo xtask publish s3)
          if [[ "$mode" == "dry-run" ]]; then
            publish_cmd+=(--dry-run)
          fi
          "${publish_cmd[@]}" \
            --endpoint-url "$XTASK_RELEASE_S3_ENDPOINT_URL" \
            --bucket "$RELEASE_BUCKET" \
            scoop --prefix "$SCOOP_PREFIX" --public-base-url "$SCOOP_PUBLIC_BASE_URL"

      - name: Upload scoop packages to GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(target/*/release/scoop/*.zip target/common/scoop/*.json)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no scoop release assets found" >&2
            exit 1
          fi
          for attempt in {1..30}; do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "github release $GITHUB_REF_NAME was not visible after waiting" >&2
              exit 1
            fi
            sleep 2
          done
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload scoop manifests
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gmutils-scoop-release
          if-no-files-found: ignore
          path: |
            gmutils/target/common/scoop/**

  homebrew:
    needs: github-release
    name: Homebrew package and S3 publish
    runs-on: macos-15
    timeout-minutes: 120
    env:
      DHTTP_ROOT_CA: ${{ github.workspace }}/gmutils/keychain/root.crt
      RELEASE_BUCKET: download
      BREW_PREFIX: brew/gmutils
      BREW_PUBLIC_BASE_URL: https://download.dhttp.net/brew/gmutils
      HOMEBREW_TAP_REPOSITORY: genmeta/homebrew-genmeta
      HOMEBREW_TAP_BASE_BRANCH: main
    defaults:
      run:
        shell: bash
        working-directory: gmutils
    steps:
      - name: Checkout gmutils
        uses: actions/checkout@v6
        with:
          path: gmutils
          persist-credentials: false

      - name: Validate release configuration
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          required=(
            XTASK_RELEASE_S3_ENDPOINT_URL
            DHTTP_STUN_SERVER
            DHTTP_H3_DNS_SERVER
            DHTTP_HTTP_DNS_SERVER
            DHTTP_MDNS_SERVICE
            DHTTP_CERT_SERVER_URL
            XTASK_RELEASE_S3_ACCESS_KEY_ID
            XTASK_RELEASE_S3_SECRET_ACCESS_KEY
            HOMEBREW_TAP_GITHUB_TOKEN
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "missing required release configuration: $name" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Checkout Homebrew tap
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          ref: ${{ env.HOMEBREW_TAP_BASE_BRANCH }}
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: gmutils-macos-cargo-${{ hashFiles('gmutils/Cargo.lock') }}
          restore-keys: |
            gmutils-macos-cargo-

      - name: Package Homebrew artifacts
        run: |
          cargo xtask package --overwrite-manifest \
            brew \
              --target aarch64-apple-darwin \
              --target x86_64-apple-darwin

      - name: Publish S3 for Homebrew artifacts
        env:
          XTASK_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.XTASK_RELEASE_S3_ACCESS_KEY_ID }}
          XTASK_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.XTASK_RELEASE_S3_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          mode=dry-run
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            mode=publish
          fi
          publish_cmd=(cargo xtask publish s3)
          if [[ "$mode" == "dry-run" ]]; then
            publish_cmd+=(--dry-run)
          fi
          "${publish_cmd[@]}" \
            --endpoint-url "$XTASK_RELEASE_S3_ENDPOINT_URL" \
            --bucket "$RELEASE_BUCKET" \
            brew --prefix "$BREW_PREFIX" --public-base-url "$BREW_PUBLIC_BASE_URL"

      - name: Create Homebrew tap pull request
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          FORMULA_NAME: gmutils.rb
        run: |
          set -euo pipefail
          tap_dir="$GITHUB_WORKSPACE/homebrew-tap"
          formula_source="$PWD/target/common/brew/$FORMULA_NAME"
          formula_dest="$tap_dir/Formula/$FORMULA_NAME"
          test -f "$formula_source"

          mkdir -p "$tap_dir/Formula"
          cp "$formula_source" "$formula_dest"

          cd "$tap_dir"
          if git diff --quiet -- "Formula/$FORMULA_NAME"; then
            echo "homebrew tap formula is unchanged"
            exit 0
          fi

          branch="release/${GITHUB_REPOSITORY##*/}/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add "Formula/$FORMULA_NAME"
          git commit -m "brew: update $FORMULA_NAME"
          git push origin "$branch"
          gh pr create \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --base "$HOMEBREW_TAP_BASE_BRANCH" \
            --head "$branch" \
            --title "brew: update $FORMULA_NAME from gmutils release" \
            --body "Generated by $GITHUB_REPOSITORY release $GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT."

      - name: Upload Homebrew packages to GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(target/*/release/brew/*.tar.gz target/common/brew/*.rb)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no Homebrew release assets found" >&2
            exit 1
          fi
          for attempt in {1..30}; do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "github release $GITHUB_REF_NAME was not visible after waiting" >&2
              exit 1
            fi
            sleep 2
          done
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload Homebrew manifests
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gmutils-homebrew-release
          if-no-files-found: ignore
          path: |
            gmutils/target/common/brew/**
