[package]
name = "genmeta-common"
description = "common code for genmeta binary utilities"
version = "0.1.0"
edition = "2024"

[dependencies]
bytes = { workspace = true, optional = true }
dashmap = { workspace = true, optional = true }
derive_more = { workspace = true, features = ["from"], optional = true }
dirs = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
h3x = { workspace = true, optional = true }
peg = { workspace = true, optional = true }
rustls = { workspace = true, optional = true }
snafu = { workspace = true, optional = true }
ssh-config = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
tokio-util = { workspace = true, features = ["codec", "io"], optional = true }
tracing = { workspace = true, optional = true }

[features]
connect = [
    "error",
    "identity",
    "dep:bytes",
    "dep:dashmap",
    "dep:futures",
    "dep:h3x",
    "dep:rustls",
    "dep:snafu",
    "dep:tokio",
    "dep:tokio-util",
    "dep:tracing",
]
error = ["dep:snafu"]
identity = ["dep:dirs", "dep:peg", "dep:snafu", "dep:ssh-config", "dep:tokio"]
