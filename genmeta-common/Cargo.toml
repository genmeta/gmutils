[package]
name = "genmeta-common"
description = "common code for genmeta binary utilities"
version = "0.1.0"
edition = "2024"

[dependencies]
bytes = { workspace = true, optional = true }
dashmap = { workspace = true, optional = true }
derive_more = { workspace = true, features = ["from"], optional = true }
dirs = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
gm-quic = { workspace = true, optional = true }
h3 = { workspace = true, optional = true }
h3-shim = { workspace = true, optional = true }
peg = { workspace = true, optional = true }
qdns = { workspace = true, optional = true }
rustls = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
snafu = { workspace = true, optional = true }
ssh-config = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
tokio-util = { workspace = true, features = ["codec", "io"], optional = true }
toml = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
x509-parser = { workspace = true, optional = true }

[features]
connect = [
    "error",
    "identity",
    "dep:bytes",
    "dep:dashmap",
    "dep:futures",
    "dep:gm-quic",
    "dep:h3",
    "dep:h3-shim",
    "dep:qdns",
    "dep:rustls",
    "dep:snafu",
    "dep:tokio",
    "dep:tokio-util",
    "dep:tracing",
]
error = ["dep:snafu"]
h3_stream = [
    "dep:bytes",
    "dep:derive_more",
    "dep:futures",
    "dep:h3",
    "dep:h3-shim",
    "dep:tokio",
    "dep:tokio-util",
]
identity = ["dep:dirs", "dep:peg", "dep:snafu", "dep:ssh-config", "dep:tokio"]
identity2 = [
    "dep:dirs",
    "dep:rustls",
    "dep:snafu",
    "dep:serde",
    "dep:tokio",
    "dep:toml",
    "dep:x509-parser",
]
