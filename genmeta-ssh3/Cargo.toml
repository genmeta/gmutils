[package]
name = "genmeta-ssh3"
description = "ssh3 client"
version = "0.4.1"
edition = "2024"

[dependencies]
bytes = { workspace = true, features = ["serde"] }
clap = { workspace = true }
futures = { workspace = true }
genmeta-common = { workspace = true, features = ["connect", "h3_stream", "id"] }
ssh-config = { workspace = true, features = ["openssh"] }
gm-quic = { workspace = true }
genmeta-ssh3-client = { workspace = true }
h3 = { workspace = true }
h3-shim = { workspace = true }
http = { workspace = true }
qdns = { workspace = true }
qtraversal = { workspace = true }
rustls = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true, features = ["codec", "rt"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
whoami = { workspace = true }

