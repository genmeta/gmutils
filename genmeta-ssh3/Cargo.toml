[package]
name = "genmeta-ssh3"
description = "ssh3 client"
version = "0.4.1"
edition = "2024"

[dependencies]
base64 = { workspace = true }
bytes = { workspace = true, features = ["serde"] }
clap = { workspace = true }
crossterm = { workspace = true, features = ["events"] }
dashmap = { workspace = true }
futures = { workspace = true }
genmeta-common = { workspace = true }
ssh3-proto = { workspace = true }
ssh-config = { workspace = true, features = ["openssh", "genmeta"] }
gm-quic = { workspace = true }
h3 = { workspace = true }
h3-shim = { workspace = true }
http = { workspace = true }
peg = { workspace = true }
qdns = { workspace = true }
qtraversal = { workspace = true }
regex = { workspace = true }
rpassword = { workspace = true }
rustls = { workspace = true }
serde = { workspace = true }
serde_cbor = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true, features = ["codec", "rt"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
whoami = { workspace = true }


