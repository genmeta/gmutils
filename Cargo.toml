
[workspace]
resolver = "3"
members = [
    "genmeta",
    "genmeta-common",
    "genmeta-curl",
    "genmeta-ssh",
    "genmeta-nslookup",
    "genmeta-discover",
    "genmeta-nat",
    "genmeta-doctor",
    "genmeta-identity",
    "genmeta-home",
    "genmeta-proxy",
]

[workspace.dependencies]
# async
futures = "0.3"
daemonize = "0.5"
tokio = { version = "1", features = ["full"] }

# cli
clap = { version = "4", features = ["derive"] }
inquire = "0.9"
inquire-derive = "0.9"
indicatif = "0.18"
rpassword = "7.3"
whoami = "2"

# debug
console-subscriber = "0.5"

# network
gmdns = { path = "../gmdns" }
h3x = { path = "../h3x" }
qinterface = { path = "../gm-quic/qinterface", features = ["qudp"] }
qtraversal = { path = "../gm-quic/qtraversal" }
qevent = { path = "../gm-quic/qevent", features = ["telemetry"] }
http = "1"
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["server", "tokio"] }
http-body-util = "0.1"
reqwest = { version = "0.13", default-features = false, features = [
    "charset",
    "http2",
    "system-proxy",
    "gzip",
    "json",
    "zstd",
    "rustls-no-provider",
] }

# security
# rankey = { git = "ssh://git@github.com/genmeta/rankey.git" }
rankey = { path = "../rankey" }
rustls = { version = "0.23", default-features = false, features = ["ring"] }
x509-parser = "0.14"

# serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_cbor = "0.11"
toml = "1"

# tracing
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }
tracing-indicatif = { version = "0.3" }

# builder
bon = "3"

# utils
base64 = "0.22"
bytes = "1"
crossterm = { version = "0.29" }
dashmap = { version = "6" }
derive_more = { version = "2" }
dirs = { version = "6" }
either = "1"
globset = "0.4"
peg = "0.8"
snafu = "0.9"
tokio-util = { version = "0.7" }
async-compression = { version = "0.4", features = [
    "tokio",
    "gzip",
    "deflate",
    "zstd",
] }
trust-dns-resolver = "0.23.2"

# workspace
genmeta-common = { path = "genmeta-common" }
genmeta-home = { path = "genmeta-home" }
genmeta-curl = { path = "genmeta-curl" }
genmeta-discover = { path = "genmeta-discover" }
genmeta-doctor = { path = "genmeta-doctor" }
genmeta-identity = { path = "genmeta-identity" }
genmeta-nat = { path = "genmeta-nat" }
genmeta-nslookup = { path = "genmeta-nslookup" }
genmeta-ssh = { path = "genmeta-ssh" }
genmeta-proxy = { path = "genmeta-proxy" }

# ssh
# ssh-config = { git = "ssh://git@github.com/genmeta/genmeta-ssh3.git" }
# genmeta-ssh3-client = { git = "ssh://git@github.com/genmeta/genmeta-ssh3.git" }
genmeta-ssh3-core = { package = "genmeta-ssh", path = "../genmeta-ssh3", features = [
    "config",
] }

# debug
# [patch.'ssh://git@github.com/genmeta/gm-quic-traversal.git']
# gm-quic = { path = "../gm-quic-traversal/gm-quic" }
# h3-shim = { path = "../gm-quic-traversal/h3-shim" }
# qbase = { path = "../gm-quic-traversal/qbase" }
# qdns = { path = "../gm-quic-traversal/qdns" }
# qevent = { path = "../gm-quic-traversal/qevent" }
# qinterface = { path = "../gm-quic-traversal/qinterface" }
# qtraversal = { path = "../gm-quic-traversal/qtraversal" }

# [patch.'ssh://git@github.com/genmeta/gmdns.git']
# gmdns = { path = "../gmdns" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
