[workspace]
resolver = "3"
members = ["genmeta", "genmeta-request", "genmeta-ssh"]


[workspace.dependencies]

# async
tokio = { version = "1", features = ["full"] }
futures = "0.3"

# cli
clap = { version = "4", features = ["derive"] }
rpassword = "7.3"
whoami = "1.4"

# genmeta
gm-quic = "0.2.0"
h3-shim = "0.2.0"
qconnection = "0.2.0"
qinterface = "0.2.0"
qevent = "0.2.0"
qtraversal = "0.2.0"
gateway = { git = "ssh://git@github.com/genmeta/gateway.git", branch = "develop" }

# http
http = "1"
http-body-util = "0.1"
hyper = { version = "1", features = ["http1", "server", "client"] }
hyper-util = { version = "0.1", features = ["tokio"] }
h3 = { version = "0.0.7", features = ["tracing"] }

# security
rustls = { version = "0.23", default-features = false, features = ["ring"] }
rustls-native-certs = "0.8"
pam = "0.7"

# serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# tracing
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }

# utils
bytes = "1"
base64 = "0.22"
crossterm = { version = "0.29", features = ["events", "event-stream"] }

# workspace
genmeta-ssh = { path = "genmeta-ssh" }
genmeta-request = { path = "genmeta-request" }

[patch.crates-io]
h3-shim = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
gm-quic = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qinterface = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qconnection = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qtraversal = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qevent = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }

[patch.'ssh://git@github.com/genmeta/gateway.git']
h3-shim = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
gm-quic = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qinterface = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qconnection = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qtraversal = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qevent = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
