[workspace]
resolver = "3"
members = [
    "genmeta",
    "genmeta-common",
    "genmeta-curl",
    "genmeta-ssh3",
    "genmeta-nslookup",
    "genmeta-discover",
    "ssh3-proto",
]

[workspace.dependencies]
# async
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
futures = "0.3"

# cli
clap = { version = "4", features = ["derive"] }
rpassword = "7.3"
whoami = "1.4"

# genmeta
gm-quic = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
gmdns = { git = "ssh://git@github.com/genmeta/gmdns.git", branch = "main" }
h3-shim = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qconnection = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qbase = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qdns = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qevent = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qinterface = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }
qtraversal = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "develop" }

# http
http = "1"
h3 = { version = "0.0.8", features = ["tracing"] }

# security
rustls = { version = "0.23", default-features = false, features = ["ring"] }
# dont load system certs
# rustls-native-certs = "0.8" 

# serialization
serde = { version = "1", features = ["derive"] }
serde_cbor = "0.11"

# tracing
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }
console-subscriber = "0.4"

# utils
atty = "0.2"
bytes = "1"
base64 = "0.22"
crossterm = { version = "0.29" }
crossterm_winapi = { version = "0.9" }
dashmap = { version = "6" }
derive_more = { version = "2" }
either = { version = "1" }
peg = "0.8"
pin-project-lite = "0.2"
regex = "1"
socks5-proto = "0.4"
socket2 = "0.5"
thiserror = "2"
tokio-util = { version = "0.7" }

# workspace
genmeta-common = { path = "genmeta-common" }     # common code
ssh3-proto = { path = "ssh3-proto" }             # ssh3-common
genmeta-ssh3 = { path = "genmeta-ssh3" }         # ssh3 
genmeta-curl = { path = "genmeta-curl" }         # curl
genmeta-nslookup = { path = "genmeta-nslookup" } # nslookup
genmeta-discover = { path = "genmeta-discover" } # discover

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
