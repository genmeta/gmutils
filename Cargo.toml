[workspace]
resolver = "3"
members = [
    "genmeta",
    "genmeta-common",
    "genmeta-curl",
    "genmeta-ssh3",
    "genmeta-nslookup",
    "genmeta-discover",
    "genmeta-nat",
    "genmeta-profile",
    "genmeta-doctor",
]

[workspace.dependencies]
# async
futures = "0.3"
tokio = { version = "1", features = ["full"] }

# cli
clap = { version = "4", features = ["derive"] }
rpassword = "7.3"
whoami = "1.4"

# genmeta
gm-quic = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "main" }
h3-shim = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "main" }
qbase = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "main" }
qdns = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "main" }
qinterface = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "main" }
qtraversal = { git = "ssh://git@github.com/genmeta/gm-quic-traversal.git", branch = "main" }

# http
h3 = { version = "0.0.8", features = ["tracing"] }
http = "1"

# security
rustls = { version = "0.23", default-features = false, features = ["ring"] }

# serialization
serde = { version = "1", features = ["derive"] }
serde_cbor = "0.11"

# tracing
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "ansi",
    "time",
    "local-time",
] }

# utils
bytes = "1"
crossterm = { version = "0.29" }
dashmap = { version = "6" }
derive_more = { version = "2" }
dirs = { version = "6" }
peg = "0.8"
snafu = "0.8"
tokio-util = { version = "0.7" }
trust-dns-resolver = "0.23.2"

# workspace
genmeta-common = { path = "genmeta-common" }
genmeta-curl = { path = "genmeta-curl" }
genmeta-discover = { path = "genmeta-discover" }
genmeta-doctor = { path = "genmeta-doctor" }
genmeta-nat = { path = "genmeta-nat" }
genmeta-nslookup = { path = "genmeta-nslookup" }
genmeta-profile = { path = "genmeta-profile" }
genmeta-ssh3 = { path = "genmeta-ssh3" }

# ssh
ssh-config = { git = "ssh://git@github.com/genmeta/genmeta-ssh3.git" }
genmeta-ssh3-client = { git = "ssh://git@github.com/genmeta/genmeta-ssh3.git" }

# debug
# [patch.'ssh://git@github.com/genmeta/gm-quic-traversal.git']
# gm-quic = { path = "../gm-quic-traversal/gm-quic" }
# h3-shim = { path = "../gm-quic-traversal/h3-shim" }
# qbase = { path = "../gm-quic-traversal/qbase" }
# qdns = { path = "../gm-quic-traversal/qdns" }
# qevent = { path = "../gm-quic-traversal/qevent" }
# qinterface = { path = "../gm-quic-traversal/qinterface" }
# qtraversal = { path = "../gm-quic-traversal/qtraversal" }

# [patch.'ssh://git@github.com/genmeta/gmdns.git']
# gmdns = { path = "../gmdns" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
